<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Masterclass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: rgba(22, 24, 32, 0.94);
      --panel-edge: rgba(255, 255, 255, 0.06);
      --ink: #f5f1e8;
      --ink-soft: #c5c0b3;
      --ink-mute: #7a7669;
      --gold: #c9a96a;
      --gold-soft: #8a7654;
      --rule: rgba(201, 169, 106, 0.22);
      --danger: #d97a6c;
      --accent: #a4b8d6;
      --good: #8ec585;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100vh;
    }
    body {
      background:
        radial-gradient(900px 600px at 12% -10%, rgba(201, 169, 106, 0.12), transparent 70%),
        radial-gradient(800px 700px at 100% 110%, rgba(80, 100, 160, 0.18), transparent 70%),
        linear-gradient(180deg, #0b0d12 0%, #0a0c11 100%);
    }

    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 32px;
      border-bottom: 1px solid var(--panel-edge);
    }
    .brand {
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
    }
    .brand .mark {
      width: 28px; height: 28px;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 4px;
      display: grid; place-items: center;
      font-size: 13px; font-weight: 700;
    }
    .brand .name { font-size: 14px; font-weight: 600; }
    .brand .name em { color: var(--gold); font-style: normal; }
    .topbar .meta {
      display: flex; gap: 18px; align-items: center;
      font-size: 12px; color: var(--ink-mute);
    }
    .topbar .meta input {
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--gold-soft);
      color: var(--ink);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      padding: 4px 6px;
      width: 110px;
      outline: none;
    }

    .user-menu { position: relative; }
    .auth-pill {
      color: var(--ink-soft); text-decoration: none; background: rgba(255,255,255,0.035);
      border: 1px solid rgba(201,169,106,0.24); border-radius: 999px;
      padding: 6px 12px; font-size: 12px; cursor: pointer;
    }
    .auth-pill:hover { border-color: var(--gold); color: var(--ink); }
    .user-dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 8px); min-width: 150px;
      background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 6px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.35); padding: 6px; z-index: 20;
    }
    .user-dropdown.open { display: block; }
    .user-dropdown a, .user-dropdown button {
      display: block; width: 100%; text-align: left; padding: 8px 10px; border: 0;
      background: transparent; color: var(--ink-soft); text-decoration: none; font: 12px "Inter", sans-serif;
      cursor: pointer; border-radius: 4px;
    }
    .user-dropdown a:hover, .user-dropdown button:hover { background: rgba(201,169,106,0.08); color: var(--gold); }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 28px 80px;
    }

    .breadcrumbs {
      display: flex; gap: 6px; align-items: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 14px;
    }
    .breadcrumbs a { color: var(--ink-soft); text-decoration: none; }
    .breadcrumbs a:hover { color: var(--gold); }
    .breadcrumbs .sep { color: var(--gold-soft); }
    .breadcrumbs .current { color: var(--gold); }

    h1.page-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 6px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    p.page-sub {
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.5;
      margin: 0 0 28px;
    }

    .card-list {
      display: grid;
      gap: 14px;
    }
    .picker-card {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 22px 24px;
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 160ms ease, transform 100ms ease;
    }
    .picker-card:hover {
      border-color: rgba(201, 169, 106, 0.5);
    }
    .picker-card:active { transform: translateY(1px); }
    .picker-card .glyph {
      width: 48px; height: 48px;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 6px;
      display: grid; place-items: center;
      font-size: 22px; font-weight: 700;
    }
    .picker-card .body .title {
      font-size: 17px; font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .picker-card .body .sub {
      font-size: 13px; color: var(--ink-mute);
    }
    .picker-card .arrow {
      color: var(--gold);
      font-size: 22px;
      font-weight: 700;
    }
    .row-delete {
      background: transparent;
      border: 1px solid transparent;
      color: var(--ink-mute);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .row-delete:hover {
      color: var(--danger);
      border-color: rgba(217,122,108,0.45);
      background: rgba(217,122,108,0.08);
    }
    .row-delete:disabled {
      cursor: default;
      opacity: 0.4;
    }

    .field {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 18px;
    }
    .field label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 600;
    }
    .field input[type=text],
    .field input[type=number],
    .field input[type=url],
    .field input:not([type]),
    .field select,
    .field textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      color: var(--ink);
      font-family: "Inter", sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      transition: border-color 160ms ease, background 160ms ease;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(201, 169, 106, 0.06);
    }
    .field textarea { min-height: 90px; resize: vertical; }
    .field .hint { font-size: 12px; color: var(--ink-mute); line-height: 1.5; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .file-drop {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px dashed rgba(201, 169, 106, 0.4);
      border-radius: 4px;
      background: rgba(201, 169, 106, 0.04);
      cursor: pointer;
      position: relative;
    }
    .file-drop input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .file-drop .ico {
      color: var(--gold); font-size: 16px; font-weight: 700;
    }
    .file-drop .text { flex: 1; font-size: 13px; color: var(--ink-soft); font-weight: 500; }
    .file-drop .text small { display: block; color: var(--ink-mute); font-size: 11px; margin-top: 3px; font-weight: 400; }
    .file-drop.has-file { border-style: solid; border-color: var(--gold); background: rgba(201, 169, 106, 0.1); }

    button.primary {
      background: var(--gold);
      color: #1a1610;
      border: 0;
      border-radius: 4px;
      padding: 12px 24px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary:hover { background: #dab87a; }
    button.primary:disabled { cursor: wait; opacity: 0.55; background: var(--gold-soft); }
    button.ghost {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 4px;
      padding: 10px 18px;
      font-size: 13px;
      cursor: pointer;
    }
    button.ghost:hover { border-color: var(--gold); color: var(--ink); }

    .actions-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 14px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
    }
    .actions-right { display: flex; gap: 10px; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      border-radius: 6px;
      padding: 22px 24px;
      margin-bottom: 18px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 600;
    }

    .status-line {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .status-line.ready { background: rgba(122,178,117,0.10); color: var(--good); }
    .status-line.running, .status-line.queued { background: rgba(164,184,214,0.10); color: var(--accent); }
    .status-line.failed, .status-line.not_found { background: rgba(217,122,108,0.10); color: var(--danger); }
    .status-line.skipped, .status-line.skipped_user_upload { background: rgba(255,255,255,0.04); color: var(--ink-mute); }
    .status-line .icon {
      width: 18px; height: 18px; display: grid; place-items: center;
      font-size: 11px; font-weight: 700;
    }
    .status-line .icon.spinner {
      border: 2px solid rgba(164, 184, 214, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-line .label { flex: 1; }
    .status-line .meta { color: var(--ink-mute); font-family: "JetBrains Mono", monospace; font-size: 11px; }

    .lesson-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .lesson-row .when { color: var(--ink-mute); font-size: 12px; font-family: "JetBrains Mono", monospace; }
    .lesson-row .body .title { font-weight: 600; }
    .lesson-row .body .notes { color: var(--ink-mute); font-size: 12px; margin-top: 2px; }
    .lesson-row .badge {
      font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 10px; font-weight: 600;
    }
    .lesson-row .badge.ready { background: rgba(122,178,117,0.15); color: var(--good); }
    .lesson-row .badge.failed { background: rgba(217,122,108,0.15); color: var(--danger); }
    .lesson-row .badge.processing { background: rgba(164,184,214,0.15); color: var(--accent); }
    .lesson-row .badge.uploaded { background: rgba(255,255,255,0.06); color: var(--ink-mute); }

    .add-lesson-cta {
      width: 100%;
      padding: 28px;
      border: 1px dashed rgba(201, 169, 106, 0.4);
      background: rgba(201, 169, 106, 0.04);
      color: var(--gold);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      transition: border-color 160ms ease, background 160ms ease;
    }
    .add-lesson-cta:hover {
      border-color: var(--gold);
      background: rgba(201, 169, 106, 0.10);
    }

    .progress-stack { display: grid; gap: 8px; }
    .progress-bar-shell {
      width: 100%; height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar-shell .fill {
      height: 100%;
      background: var(--gold);
      transition: width 200ms ease;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-mute);
      font-size: 14px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 6px;
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      max-width: 360px;
      padding: 14px 18px;
      border-radius: 4px;
      background: rgba(22, 24, 32, 0.98);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--ink-soft);
      font-size: 13px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      display: none;
    }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand">
      <div class="mark">m</div>
      <span class="name">Music <em>Masterclass</em></span>
    </div>
    <div class="meta">
      <div class="user-menu"><a id="auth-pill" class="auth-pill" href="/auth/login">Sign in with Google</a><div id="user-dropdown" class="user-dropdown"></div></div>
    </div>
  </header>

  <main id="app"><!-- view rendered here --></main>

  <div id="byok-banner" style="display:none;position:fixed;bottom:20px;right:20px;max-width:380px;background:rgba(217,122,108,0.16);border:1px solid rgba(217,122,108,0.45);border-radius:6px;padding:14px 16px;font-size:13px;line-height:1.5;color:#f0b0a7;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.4);">
    <div style="font-weight:600;margin-bottom:6px;color:#f5d8d4;">Gemini API key required</div>
    <div>You need a Gemini API key before you can create masterclasses or upload lessons. <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style="color:#f5d8d4;text-decoration:underline;">Get a free key</a> then <a href="/settings" style="color:#f5d8d4;text-decoration:underline;">paste it in Settings</a>.</div>
    <button type="button" id="byok-dismiss" style="margin-top:8px;background:transparent;border:1px solid rgba(245,216,212,0.45);color:#f5d8d4;border-radius:3px;padding:3px 10px;font-size:11px;cursor:pointer;">Dismiss</button>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ---------- helpers ----------
    const app = document.getElementById("app");
    const toastEl = document.getElementById("toast");
    let currentUser = null;
    document.getElementById("brand").addEventListener("click", () => goto("/"));

    async function initAuthPill() {
      const pill = document.getElementById("auth-pill");
      const dropdown = document.getElementById("user-dropdown");
      try {
        currentUser = await fetch("/auth/me").then(r => r.ok ? r.json() : null);
      } catch (_) { currentUser = null; }
      if (currentUser) {
        pill.textContent = `${currentUser.email} ▾`;
        pill.href = "javascript:void(0)";
        pill.onclick = (e) => { e.preventDefault(); dropdown.classList.toggle("open"); };
        dropdown.innerHTML = `<a href="/settings">Settings</a><button type="button" id="auth-signout">Sign out</button>`;
        document.getElementById("auth-signout").onclick = async () => { await fetch("/auth/logout", { method: "POST" }); window.location.href = "/"; };
      } else {
        pill.textContent = "Sign in with Google";
        pill.href = `/auth/login?next=${encodeURIComponent(window.location.pathname + window.location.search + window.location.hash)}`;
        dropdown.classList.remove("open");
        dropdown.innerHTML = "";
      }
      document.addEventListener("click", (e) => { if (!e.target.closest(".user-menu")) dropdown.classList.remove("open"); });
      // Show BYOK reminder banner when signed in without a key, so the
      // user doesn't get a confusing 402 in the middle of uploading.
      const banner = document.getElementById("byok-banner");
      if (banner) {
        if (currentUser && currentUser.has_gemini_key === false) {
          banner.style.display = "block";
        } else {
          banner.style.display = "none";
        }
        const dismiss = document.getElementById("byok-dismiss");
        if (dismiss) dismiss.onclick = () => { banner.style.display = "none"; };
      }
    }

    // Identity travels via the HttpOnly session cookie the browser sends
    // automatically. No X-User-Id header, no ?user_id= query string — both
    // were impersonation primitives before /auth/login existed.
    function uquery() { return ""; }
    async function fetchJson(url, options = {}) {
      const r = await fetch(url, options);
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.detail || `Request failed (${r.status})`);
      return data;
    }
    function uploadWithProgress(url, formData, onProgress) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", url);
        if (xhr.upload && onProgress) xhr.upload.addEventListener("progress", (e) => {
          if (e.lengthComputable) onProgress(e.loaded, e.total);
        });
        xhr.onload = () => {
          let payload = {};
          try { payload = JSON.parse(xhr.responseText || "{}"); } catch {}
          if (xhr.status >= 200 && xhr.status < 300) resolve(payload);
          else reject(new Error(payload.detail || `Request failed (${xhr.status})`));
        };
        xhr.onerror = () => reject(new Error("Network error"));
        xhr.send(formData);
      });
    }
    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }
    function formatDate(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
      } catch { return iso; }
    }
    function showToast(msg, isError = false) {
      toastEl.textContent = msg;
      toastEl.classList.toggle("error", isError);
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), 4500);
    }

    function goto(path) {
      window.location.hash = "#" + path;
    }
    function currentRoute() {
      const raw = (window.location.hash || "#/").slice(1);
      const parts = raw.split("/").filter(Boolean);
      return parts;
    }

    // ---------- routing ----------
    const routes = [
      { match: (p) => p.length === 0, view: viewLanding },
      { match: (p) => p.length === 1 && p[0] === "new", view: viewNewClass },
      { match: (p) => p.length === 2 && p[0] === "class", view: (p) => viewClassHome(p[1]) },
      { match: (p) => p.length === 3 && p[0] === "class" && p[2] === "lesson", view: (p) => viewNewLesson(p[1]) },
      { match: (p) => p.length === 5 && p[0] === "class" && p[2] === "lesson" && p[4] === "processing", view: (p) => viewProcessing(p[1], p[3]) },
    ];
    let stopPolling = null;
    async function render() {
      if (stopPolling) { stopPolling(); stopPolling = null; }
      const parts = currentRoute();
      const route = routes.find(r => r.match(parts));
      app.innerHTML = `<div class="empty">Loading…</div>`;
      try {
        if (route) await route.view(parts);
        else app.innerHTML = `<div class="empty">Page not found. <a href="#/" style="color:var(--gold)">Go home</a></div>`;
      } catch (err) {
        app.innerHTML = `<div class="empty" style="color:var(--danger)">${escapeHtml(err.message)}</div>`;
      }
    }
    window.addEventListener("hashchange", render);

    // ---------- view: landing ----------
    async function viewLanding() {
      const classes = await fetchJson("/masterclasses").catch(() => []);
      app.innerHTML = `
        <div class="breadcrumbs"><span class="current">Home</span></div>
        <h1 class="page-title">What would you like to do?</h1>
        <p class="page-sub">Each masterclass is one piece you're working on, with all the lessons that go with it.</p>
        <div class="card-list">
          <div class="picker-card" id="opt-new">
            <div class="glyph">+</div>
            <div class="body">
              <div class="title">Start a new masterclass</div>
              <div class="sub">Begin work on a piece you haven't studied here yet.</div>
            </div>
            <div class="arrow">→</div>
          </div>
          <div class="picker-card" id="opt-continue">
            <div class="glyph">↻</div>
            <div class="body">
              <div class="title">Continue a masterclass</div>
              <div class="sub">${classes.length} ${classes.length === 1 ? "class" : "classes"} in your library.</div>
            </div>
            <div class="arrow">→</div>
          </div>
        </div>
      `;
      document.getElementById("opt-new").onclick = () => goto("/new");
      document.getElementById("opt-continue").onclick = () => {
        if (!classes.length) {
          showToast("No masterclasses yet — start a new one first.");
          return;
        }
        renderContinueList(classes);
      };
    }

    function renderContinueList(classes) {
      app.innerHTML = `
        <div class="breadcrumbs">
          <a href="#/">Home</a><span class="sep">·</span><span class="current">Continue</span>
        </div>
        <h1 class="page-title">Pick a masterclass to continue</h1>
        <p class="page-sub">Click a piece to open its class home.</p>
        <div class="card-list">
          ${classes.map(c => {
            const m = c.masterclass.masterclass_id;
            const sub = `${c.lessons.length} lesson${c.lessons.length === 1 ? "" : "s"}${c.movement ? " · " + escapeHtml(c.movement) : ""}`;
            return `
              <div class="picker-card" data-id="${m}">
                <div class="glyph">♪</div>
                <div class="body">
                  <div class="title">${escapeHtml(c.piece_name)}</div>
                  <div class="sub">${sub}</div>
                </div>
                <button type="button" class="row-delete" data-mc-delete="${m}" data-name="${escapeHtml(c.piece_name)}" title="Delete this masterclass and all its lessons" aria-label="Delete">🗑</button>
                <div class="arrow">→</div>
              </div>`;
          }).join("")}
        </div>
        <div class="actions-row">
          <button type="button" class="ghost" onclick="goto('/')">← Back</button>
          <span></span>
        </div>
      `;
      for (const card of app.querySelectorAll(".picker-card[data-id]")) {
        card.onclick = (event) => {

    function cleanFormData(form) {
      const data = new FormData(form);
      for (const [k, v] of [...data.entries()]) {
        if (typeof v === "string" && v.trim() === "") data.delete(k);
        if (v instanceof File && v.size === 0 && v.name === "") data.delete(k);
      }
      return data;
    }
    function bindFileDrops(scope) {
      for (const drop of scope.querySelectorAll(".file-drop")) {
        const input = drop.querySelector("input[type=file]");
        if (!input) continue;
        input.addEventListener("change", () => {
          const file = input.files && input.files[0];
          const text = drop.querySelector(".text");
          if (file) {
            drop.classList.add("has-file");
            text.innerHTML = `${escapeHtml(file.name)}<small>${(file.size / 1024).toFixed(1)} KB · attached</small>`;
          } else {
            drop.classList.remove("has-file");
          }
        });
      }
    }

          <button type="button" class="ghost" onclick="goto('/class/${masterclassId}')">← Class home</button>
          <button type="button" id="retry-failed-btn" class="ghost" onclick="retryFailedStages('${masterclassId}','${sessionId}')">↻ Retry failed</button>
          <button type="button" id="rerun-btn" class="ghost" onclick="rerunLesson('${masterclassId}','${sessionId}')">⟲ Re-run all</button>
          <a id="open-player" class="primary" style="display:none;text-decoration:none" target="_blank">Open player →</a>
        </div>
      `;
      const handle = pollProcessing(masterclassId, sessionId);
      stopPolling = () => clearTimeout(handle);
    }

    async function retryFailedStages(masterclassId, sessionId) {
      const btn = document.getElementById("retry-failed-btn");
      if (btn) { btn.disabled = true; btn.textContent = "Retrying…"; }
      try {
        const r = await fetch(`/lessons/${sessionId}/retry-failed`, { method: "POST" });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `Retry failed (${r.status})`);
        const n = (data.retried_stages || []).length;
        showToast(n ? `Retrying ${n} stage${n > 1 ? "s" : ""}` : "Nothing to retry");
        if (typeof stopPolling === "function") stopPolling();
        const handle = pollProcessing(masterclassId, sessionId);
        stopPolling = () => clearTimeout(handle);
      } catch (err) {
        showToast(err.message, true);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = "↻ Retry failed"; }
      }
    }

    async function rerunLesson(masterclassId, sessionId) {
      if (!confirm("Re-run ALL stages from scratch? This re-ingests audio (~4 min). Use 'Retry failed' if you only need to retry failed stages.")) return;
      const btn = document.getElementById("rerun-btn");
      if (btn) { btn.disabled = true; btn.textContent = "Retrying…"; }
      try {
        const r = await fetch(`/lessons/${sessionId}/rerun`, { method: "POST" });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `Rerun failed (${r.status})`);
        showToast("Pipeline restarted");
        // Tear down any prior poll loop so we don't double-poll.
        if (typeof stopPolling === "function") stopPolling();
        const handle = pollProcessing(masterclassId, sessionId);
        stopPolling = () => clearTimeout(handle);
      } catch (err) {
        showToast(err.message, true);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = "↻ Retry"; }
      }
    }

    function pollProcessing(masterclassId, sessionId) {
      let timer = null;
      async function tick() {
        try {
          const session = await fetchJson(`/sessions/${sessionId}`);
          const states = {};
          for (const def of STAGE_DEFS) states[def.key] = session.metadata[`${def.key}_state`] || "pending";
          renderStageStack(states);
          const ready = STAGE_DEFS.filter(d => states[d.key] === "ready" || (states[d.key] || "").startsWith("skipped")).length;
          const fill = Math.min(100, Math.round((ready / STAGE_DEFS.length) * 100));
          document.getElementById("overall-fill").style.width = `${Math.max(5, fill)}%`;
          if (session.state === "ready") {
            const link = document.getElementById("open-player");
            link.href = `/lessons/${sessionId}/player`;
            link.style.display = "inline-block";
            return;
          }
          if (session.state === "failed") {
            const last = (session.errors || []).slice(-1)[0] || {};
            showToast(`Lesson failed: ${last.error || "unknown"}`, true);
          }
          timer = setTimeout(tick, 2500);
        } catch (err) {
          showToast(err.message, true);
          timer = setTimeout(tick, 5000);
        }
      }
      tick();
      return () => { if (timer) clearTimeout(timer); };
    }

    function renderStageStack(states) {
      const box = document.getElementById("stage-stack");
      if (!box) return;
      box.innerHTML = STAGE_DEFS.map(def => {
        const s = (states[def.key] || "pending");
        const cls = s === "ready" ? "ready" :
          s === "running" || s === "queued" ? "running" :
          s === "failed" ? "failed" :
          s.startsWith("skipped") ? "skipped" : "skipped";
        const icon = s === "ready" ? `<span class="icon">✓</span>` :
          s === "running" ? `<span class="icon spinner"></span>` :
          s === "failed" ? `<span class="icon">✗</span>` :
          s.startsWith("skipped") ? `<span class="icon">—</span>` :
          `<span class="icon">·</span>`;
        return `<div class="status-line ${cls}">${icon}<span class="label">${escapeHtml(def.label)}</span><span class="meta">${escapeHtml(s.replace(/_/g, " "))}</span></div>`;
      }).join("");
    }

    // ---------- boot ----------
    if (!window.location.hash) window.location.hash = "#/";
    initAuthPill().then(render);
  </script>
</body>
</html>
