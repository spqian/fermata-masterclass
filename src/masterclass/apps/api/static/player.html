<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lesson · Music Masterclass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: rgba(22, 24, 32, 0.94);
      --panel-edge: rgba(255, 255, 255, 0.06);
      --ink: #f5f1e8;
      --ink-soft: #c5c0b3;
      --ink-mute: #7a7669;
      --gold: #c9a96a;
      --gold-soft: #8a7654;
      --rule: rgba(201, 169, 106, 0.22);
      --danger: #d97a6c;
      --accent: #a4b8d6;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100vh;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 28px;
      border-bottom: 1px solid var(--panel-edge);
    }
    .brand { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; }
    .brand .mark {
      width: 26px; height: 26px;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 4px;
      display: grid; place-items: center;
      font-weight: 700;
    }
    .brand a { color: var(--ink-mute); text-decoration: none; font-size: 12px; margin-left: 8px; }
    .brand a:hover { color: var(--gold); }
    .topbar .meta {
      font-size: 12px; color: var(--ink-mute);
      display: flex; gap: 14px; align-items: center;
    }
    .topbar .meta .alignment-tag {
      padding: 2px 8px;
      font-size: 11px;
      letter-spacing: 0.04em;
      border-radius: 10px;
    }
    .topbar .meta .alignment-tag.dtw { background: rgba(122,178,117,0.15); color: #8ec585; }
    .topbar .meta .alignment-tag.llm { background: rgba(217,166,108,0.15); color: var(--gold); }
    .topbar .meta input {
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--gold-soft);
      color: var(--ink);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      padding: 4px 6px;
      width: 100px;
      outline: none;
    }

    .user-menu { position: relative; }
    .auth-pill {
      color: var(--ink-soft); text-decoration: none; background: rgba(255,255,255,0.035);
      border: 1px solid rgba(201,169,106,0.24); border-radius: 999px;
      padding: 6px 12px; font-size: 12px; cursor: pointer;
    }
    .auth-pill:hover { border-color: var(--gold); color: var(--ink); }
    .user-dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 8px); min-width: 150px;
      background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 6px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.35); padding: 6px; z-index: 20;
    }
    .user-dropdown.open { display: block; }
    .user-dropdown a, .user-dropdown button {
      display: block; width: 100%; text-align: left; padding: 8px 10px; border: 0;
      background: transparent; color: var(--ink-soft); text-decoration: none; font: 12px "Inter", sans-serif;
      cursor: pointer; border-radius: 4px;
    }
    .user-dropdown a:hover, .user-dropdown button:hover { background: rgba(201,169,106,0.08); color: var(--gold); }
    main {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 22px;
      height: calc(100vh - 56px);
      min-height: 0;
      overflow: hidden;
    }
    .player-grid {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(0, 2.2fr) minmax(300px, 1.1fr);
      gap: 14px;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }
    .player-grid > .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
    }
    .player-col-mid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }
    .player-col-mid > .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .player-col-mid > .video-panel { flex: 0 0 auto; }
    .player-col-mid > .score-track {
      flex: 1 1 auto;
      min-height: 0;
    }
    .lesson-grid {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(320px, 2fr);
      gap: 16px;
      align-items: stretch;
      min-height: 320px;
      max-height: 46vh;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      border-radius: 4px;
      padding: 14px 16px;
    }
    .video-panel { flex: 0 0 auto; }
    .panel-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .panel-title .opus { color: var(--gold); font-size: 13px; font-weight: 600; letter-spacing: 0; text-transform: none; }
    video {
      width: 100%;
      height: 28vh;
      min-height: 180px;
      max-height: 360px;
      background: #000;
      border-radius: 4px;
      display: block;
      object-fit: contain;
    }
    .video-meta {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 10px;
      font-size: 13px; color: var(--ink-soft);
    }
    .video-meta h2 { margin: 0 0 2px; font-size: 17px; font-weight: 600; color: var(--ink); }
    .video-meta .sub { font-size: 12px; color: var(--ink-mute); }
    .state-badge {
      font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 10px; font-weight: 600;
    }
    .state-badge.ready { background: rgba(122,178,117,0.15); color: #8ec585; }
    .state-badge.failed { background: rgba(217,122,108,0.15); color: var(--danger); }
    .state-badge.processing { background: rgba(164,184,214,0.15); color: var(--accent); }

    .timeline {
      position: relative;
      height: 26px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--panel-edge);
      border-radius: 4px;
      cursor: pointer;
      margin-top: 6px;
    }
    .timeline .progress-bar {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
      background: rgba(201, 169, 106, 0.18);
      border-right: 1px solid var(--gold);
    }
    .timeline .marker {
      position: absolute; top: 4px; bottom: 4px; width: 3px;
      background: var(--gold); cursor: pointer; border-radius: 1px;
      transition: background 120ms ease, transform 120ms ease;
    }
    .timeline .marker:hover { background: #f0d089; transform: scaleY(1.2); }
    .timeline .marker.active { background: #fff; }

    /* Tracked score panel */
    .score-track {
      flex: 0 0 auto;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .score-track .stage {
      flex: 0 0 auto;
      position: relative;
      overflow: hidden;
      background: #fff;
      border-radius: 4px;
      min-height: 140px;
      transition: height 200ms ease;
    }
    .score-track .stage img {
      position: absolute;
      transform-origin: top left;
      will-change: transform;
      transition: transform 320ms ease;
    }
    .score-track .overlay {
      position: absolute;
      pointer-events: none;
      border: 2px solid #f0c248;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.6) inset, 0 0 14px rgba(240, 194, 72, 0.6);
      border-radius: 3px;
      transition: opacity 200ms ease, top 200ms ease, left 200ms ease, width 200ms ease, height 200ms ease;
      opacity: 0;
    }
    .score-track .overlay.active { opacity: 1; }
    .score-track .note-ref-overlays,
    .score-track .anchor-markers {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 4;
    }
    .score-track .score-note-band {
      position: absolute;
      background: rgba(201, 169, 106, 0.24);
      border: 1px solid rgba(240, 208, 137, 0.95);
      box-shadow: 0 0 12px rgba(201, 169, 106, 0.35);
      border-radius: 3px;
    }
    .score-track .score-anchor-line {
      position: absolute; width: 1px;
      background: rgba(201, 169, 106, 0.34);
      border-left: 1px solid rgba(0, 0, 0, 0.12);
    }
    .score-track .score-anchor-label {
      position: absolute; transform: translateX(-50%);
      color: rgba(60, 45, 20, 0.72);
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(201, 169, 106, 0.35);
      padding: 1px 4px; border-radius: 3px;
      font: 10px/1.2 "JetBrains Mono", monospace;
    }
    .score-track .info-bar {
      display: flex; gap: 12px; align-items: center;
      font-size: 12px; color: var(--ink-mute);
      font-family: "JetBrains Mono", monospace;
    }
    .score-track .info-bar .measure { color: var(--gold); font-weight: 600; }
    .score-track .info-bar .bullet { color: var(--gold-soft); }
    .score-track .info-bar button {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 4px;
      padding: 3px 10px;
      font-family: "Inter", sans-serif;
      font-size: 11px;
      cursor: pointer;
      margin-left: auto;
    }
    .score-track .info-bar button:hover { border-color: var(--gold); color: var(--ink); }

    /* Pages strip below tracked view */
    .score-strip {
      display: flex; gap: 6px; overflow-x: auto;
      padding: 6px 0;
      max-height: 110px;
    }
    .score-strip .page-thumb {
      flex: 0 0 auto;
      width: 80px;
      cursor: pointer;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .score-strip .page-thumb img { width: 100%; display: block; background: #fff; }
    .score-strip .page-thumb .num {
      position: absolute; top: 2px; left: 2px;
      font-size: 9px; font-weight: 600; color: #fff;
      background: rgba(0,0,0,0.6); padding: 1px 4px; border-radius: 2px;
    }
    .score-strip .page-thumb.active { border-color: var(--gold); }

    .takeaway-panel, .comments-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .takeaway-scroll, .comments-scroll {
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }
    .takeaway-scroll { flex: 1; }
    .comments-scroll {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .summary { font-size: 14px; color: var(--ink-soft); line-height: 1.55; }
    .progress-notes {
      margin-top: 10px; padding: 10px 12px;
      border-left: 3px solid var(--gold);
      background: rgba(201, 169, 106, 0.06);
      font-size: 13px; color: var(--ink-soft); line-height: 1.5;
    }

    .severity-filter {
      display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
      margin-bottom: 10px;
      font-family: "JetBrains Mono", monospace;
    }
    .severity-filter .label { color: var(--ink-mute); font-size: 11px; margin-right: 2px; }
    .severity-chip, .tiny-chip {
      background: rgba(0,0,0,0.2); color: var(--ink-soft);
      border: 1px solid rgba(201,169,106,0.28);
      border-radius: 999px; padding: 3px 9px;
      font: 11px/1.2 "JetBrains Mono", monospace;
      cursor: pointer;
    }
    .severity-chip.active, .tiny-chip.active { color: var(--gold); background: rgba(201,169,106,0.10); border-color: var(--gold); }
    .severity-chip[data-severity="info"] { border-color: rgba(164,184,214,0.45); }
    .severity-chip[data-severity="warn"] { border-color: rgba(201,169,106,0.5); }
    .severity-chip[data-severity="alert"] { border-color: rgba(217,122,108,0.5); }

    .comments {
      list-style: none; margin: 0; padding: 0;
      min-height: 200px;
      overflow-y: auto;
      flex: 1;
      display: flex; flex-direction: column; gap: 10px;
    }
    .comments::-webkit-scrollbar { width: 6px; }
    .comments::-webkit-scrollbar-thumb { background: rgba(201, 169, 106, 0.3); border-radius: 3px; }
    .comment {
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.25);
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease;
    }
    .comment:hover { border-color: rgba(201, 169, 106, 0.4); background: rgba(201, 169, 106, 0.04); }
    .comment.active { border-color: var(--gold); background: rgba(201, 169, 106, 0.08); }
    .comment .row1 { display: flex; gap: 10px; align-items: baseline; margin-bottom: 4px; flex-wrap: wrap; }
    .comment .ts { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--gold); font-weight: 600; }
    .comment .cat {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ink-mute); font-weight: 600;
      padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.04);
    }
    .comment .measure { font-size: 11px; color: var(--ink-mute); margin-left: auto; }
    .comment .summary-line { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .comment .text { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }
    .comment .refs {
      margin-top: 6px; font-size: 11px;
      color: var(--ink-mute); font-family: "JetBrains Mono", monospace;
    }
    .comment .refs .ref-chip {
      display: inline-block;
      background: rgba(201, 169, 106, 0.1);
      color: var(--gold);
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 4px;
      cursor: pointer;
    }
    .comment .sev { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
    .comment .sev.info { color: var(--accent); }
    .comment .sev.warn { color: var(--gold); }
    .comment .sev.alert { color: var(--danger); }
    .dropped-wrap { margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 8px; }
    .dropped-list { margin-top: 8px; display: none; font-size: 12px; color: var(--ink-mute); line-height: 1.45; }
    .dropped-list.open { display: block; }
    .dropped-item { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .dropped-item .id { color: var(--gold); font-family: "JetBrains Mono", monospace; }
    .tool-calls-panel details { margin: 0; }
    .tool-calls-panel summary { cursor: pointer; list-style: none; }
    .tool-calls-panel summary::-webkit-details-marker { display:none; }
    .tool-call-list { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
    .tool-call { border: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.20); border-radius: 4px; padding: 8px 10px; font-family: "JetBrains Mono", monospace; font-size: 11px; }
    .tool-call .top { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
    .tool-call .name { color: var(--gold); font-weight: 600; }
    .tool-call .turn { color: var(--ink-mute); margin-left: auto; }
    .tool-status { border-radius: 10px; padding: 1px 6px; text-transform: uppercase; font-size: 9px; font-weight: 700; }
    .tool-status.ok { color: #8ec585; background: rgba(122,178,117,0.15); }
    .tool-status.error { color: var(--danger); background: rgba(217,122,108,0.15); }
    .tool-call pre { white-space: pre-wrap; word-break: break-word; margin: 0; color: var(--ink-soft); }

    .chat-msg {
      max-width: 92%;
      padding: 9px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: rgba(201,169,106,0.14);
      border: 1px solid rgba(201,169,106,0.28);
    }
    .chat-msg.teacher {
      align-self: flex-start;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .chat-msg.error { border-color: rgba(217,122,108,0.55); color: #f0b0a7; }
    .chat-msg .gemini { color: var(--gold); font-weight: 700; margin-right: 5px; }
    .chat-msg .cost { margin-top: 6px; color: var(--ink-mute); font: 10px/1.3 "JetBrains Mono", monospace; }
    .chat-msg details { margin-top: 6px; color: var(--ink-mute); }
    .chat-msg summary { cursor: pointer; font: 11px/1.3 "JetBrains Mono", monospace; color: var(--gold); }

    /* Per-comment reply thread (WhatsApp/Teams style) */
    .comment-thread-toggle {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .comment-thread-toggle .reply-toggle {
      background: transparent;
      color: var(--ink-mute);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 11px;
      cursor: pointer;
    }
    .comment-thread-toggle .reply-toggle:hover {
      color: var(--gold);
      border-color: rgba(201,169,106,0.45);
    }
    .comment-thread-toggle .reply-count {
      font-size: 11px;
      color: var(--ink-mute);
      font-family: "JetBrains Mono", monospace;
    }
    .comment-thread-toggle .reply-count:empty { display: none; }
    .comment-thread-host {
      margin-top: 8px;
      padding: 10px;
      background: rgba(0,0,0,0.18);
      border-left: 2px solid rgba(201,169,106,0.35);
      border-radius: 4px;
    }
    .thread { display: flex; flex-direction: column; gap: 8px; }
    .thread-messages {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 3px;
    }
    .thread-empty {
      font-size: 12px; color: var(--ink-mute); font-style: italic; padding: 4px 0;
    }
    .thread-input-row { display: flex; gap: 6px; align-items: flex-end; margin-top: 4px; }
    .thread-input-row textarea {
      flex: 1;
      min-height: 36px;
      max-height: 110px;
      resize: none;
      background: rgba(0,0,0,0.25);
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 4px;
      padding: 6px 8px;
      font: 13px/1.4 "Inter", sans-serif;
      outline: none;
    }
    .thread-input-row textarea:focus { border-color: var(--gold); }
    .thread-input-row button {
      background: rgba(201,169,106,0.16);
      color: var(--gold);
      border: 1px solid rgba(201,169,106,0.45);
      border-radius: 4px;
      padding: 7px 12px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
    .thread-input-row button:disabled { opacity: 0.45; cursor: default; }
    .thread-input-row .clip-upload-btn {
      background: rgba(255,255,255,0.06);
      color: var(--ink-mute);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 7px 10px;
    }
    .thread-input-row .clip-upload-btn:hover { color: var(--gold); border-color: rgba(201,169,106,0.45); }
    .drill-bubble {
      background: rgba(201,169,106,0.08);
      border-left: 3px solid var(--gold-soft);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--ink-mute);
    }
    .drill-bubble.error {
      background: rgba(217,122,108,0.10);
      border-left-color: var(--danger);
      color: var(--danger);
    }
    .drill-bubble .drill-state-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(0,0,0,0.25);
      color: var(--gold);
      margin-left: 6px;
    }
    .drill-bubble .drill-retry-link {
      color: var(--gold);
      text-decoration: underline;
      cursor: pointer;
      margin-left: 6px;
    }
    .chat-msg.teacher .drill-source-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(201,169,106,0.18);
      color: var(--gold);
      margin-right: 6px;
      vertical-align: middle;
    }

    .lesson-general-card {
      background: rgba(255,255,255,0.02);
      border-left: 2px solid rgba(201,169,106,0.25);
    }
    .lesson-general-card .row1 { color: var(--ink-mute); }

    .lesson-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .lesson-section h4 {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); margin: 0 0 6px;
    }
    .lesson-section ul { margin: 0; padding-left: 18px; line-height: 1.55; }
    .lesson-section li { margin-bottom: 4px; }
    .lesson-section .area {
      padding: 6px 8px; border-left: 2px solid var(--gold-soft);
      background: rgba(201,169,106,0.04); margin-bottom: 4px;
    }
    .lesson-section .area .focus { font-weight: 600; }
    .lesson-section .area .ex { color: var(--ink-mute); font-size: 12px; }
    .lesson-section .priority {
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 1px 5px; border-radius: 3px; margin-left: 6px;
      background: rgba(255,255,255,0.05); color: var(--ink-mute);
    }
    .lesson-section .priority.high { background: rgba(217,122,108,0.18); color: var(--danger); }
    .lesson-section .priority.medium { background: rgba(201,169,106,0.18); color: var(--gold); }

  </main>

  <script>
    const SESSION_ID = "__SESSION_ID__";
    const urlParams = new URLSearchParams(window.location.search);
    let currentUser = null;
    document.getElementById("session-id").textContent = SESSION_ID.slice(0, 12) + "…";

    async function initAuthPill() {
      const pill = document.getElementById("auth-pill");
      const dropdown = document.getElementById("user-dropdown");
      try {
        currentUser = await fetch("/auth/me").then(r => r.ok ? r.json() : null);
      } catch (_) { currentUser = null; }
      if (currentUser) {
        pill.textContent = `${currentUser.email} ▾`;
        pill.href = "javascript:void(0)";
        pill.onclick = (e) => { e.preventDefault(); dropdown.classList.toggle("open"); };
        const proLink = currentUser.pro_mode
          ? `<a href="/lessons/${encodeURIComponent(SESSION_ID)}/technical-viewer">🔬 Technical Viewer</a>`
          : "";
        dropdown.innerHTML = `<a href="/settings">Settings</a>${proLink}<button type="button" id="auth-signout">Sign out</button>`;
        document.getElementById("auth-signout").onclick = async () => { await fetch("/auth/logout", { method: "POST" }); window.location.href = "/"; };
      } else {
        pill.textContent = "Sign in with Google";
        pill.href = `/auth/login?next=${encodeURIComponent(window.location.pathname + window.location.search + window.location.hash)}`;
        dropdown.classList.remove("open");
        dropdown.innerHTML = "";
      }
      document.addEventListener("click", (e) => { if (!e.target.closest(".user-menu")) dropdown.classList.remove("open"); });
    }

    // Identity travels via the HttpOnly session cookie the browser sends
    // automatically. No X-User-Id header, no ?user_id= query string — both
    // were impersonation primitives before /auth/login existed.
    function uquery() { return ""; }
    async function fetchJson(url) {
      const r = await fetch(url);
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.detail || `${r.status}`);
      return data;
    }
    async function fetchOptionalJson(url, fallback) {
      try { return await fetchJson(url); } catch (_) { return fallback; }
    }
    async function postJson(url, body) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) {
        const detail = data.detail || {};
        const err = new Error((typeof detail === "object" && detail.reply) || detail || `${r.status}`);
        err.payload = typeof detail === "object" ? detail : data;
        err.status = r.status;
        throw err;
      }
      return data;
    }
    function fmtTime(seconds) {
      if (!isFinite(seconds)) return "–:––";
      const s = Math.floor(seconds);
      return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
    }
    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    const video = document.getElementById("video");
    video.src = `/lessons/${SESSION_ID}/video${uquery()}`;
    const timeline = document.getElementById("timeline");
    const progressBar = document.getElementById("progress-bar");
    const stateBadge = document.getElementById("state-badge");
    const pieceName = document.getElementById("piece-name");
    const lessonSub = document.getElementById("lesson-sub");
    const commentsHost = document.getElementById("comments-host");
    const summaryBox = document.getElementById("summary");
    const progressNotesBox = document.getElementById("progress-notes");
    const commentCount = document.getElementById("comment-count");
    const costTag = document.getElementById("cost-tag");
    const scoreInfo = document.getElementById("score-info");
    // Reply-thread state: one in-flight conversation per teacher-comment id.
    // `null` key represents the "lesson overall" general thread.
    const threadState = new Map();
    function threadKey(commentId) { return commentId || "__general__"; }
    function getThread(commentId) {
      const k = threadKey(commentId);
      if (!threadState.has(k)) threadState.set(k, { busy: false, messages: [], loaded: false });
      return threadState.get(k);
    }

    const scoreStage = document.getElementById("score-stage");
    const scoreImg = document.getElementById("score-img");
    const overlay = document.getElementById("overlay");
    const anchorMarkers = document.getElementById("anchor-markers");
    const noteRefOverlays = document.getElementById("note-ref-overlays");
    const scoreStrip = document.getElementById("score-strip");
    const nowMeasureEl = document.getElementById("now-measure");
    const nowPageEl = document.getElementById("now-page");
    const nowSystemEl = document.getElementById("now-system");
    const toggleFollow = document.getElementById("toggle-follow");

    let comments = [];
    let measureTimestamps = [];
    let prepDoc = null;
    let scoreMap = null;
    let scoreMapNoteById = new Map();
    let pagesData = [];               // [{page, kind, systems:[{system_index, first_measure, last_measure, bbox}]}]
    let imageNaturalSizes = {};       // page -> {w, h}
    let activeComment = null;
    let pollHandle = null;
    let currentPage = null;
    let currentSystem = null;
    let currentScoreTransform = null;
    let severityVisible = new Set(["info", "warn", "alert"]);
    let lastCommentsPayload = null;
    let following = true;
    toggleFollow.addEventListener("click", () => {
      following = !following;
      toggleFollow.textContent = following ? "Following ✓" : "Manual";
    });

    function setStateBadge(state) {
      stateBadge.className = "state-badge";
      if (state === "ready") stateBadge.classList.add("ready");
      else if (state === "failed") stateBadge.classList.add("failed");
      else stateBadge.classList.add("processing");
      stateBadge.textContent = (state || "loading").replace(/_/g, " ");
    }

    function renderManifest(payload) {
      const session = payload.session || {};
      const klass = payload.masterclass || {};
      pieceName.textContent = session.repertoire || klass.piece_name || "Lesson";
      const measures = session.metadata && session.metadata.first_measure
        ? `mm. ${session.metadata.first_measure}–${session.metadata.last_measure || "?"}`
        : "all measures";
      const stamp = session.created_at ? new Date(session.created_at).toLocaleString() : "";
      lessonSub.textContent = `${measures} · ${stamp}`;
      setStateBadge(session.state);
    }

    function renderScoreStrip() {
      if (!pagesData.length) {
        scoreStrip.innerHTML = "";
        return;
      }
      scoreStrip.innerHTML = pagesData.map(p => `
        <div class="page-thumb" data-page="${p.page}">
          <img src="/lessons/${SESSION_ID}/score-page/${p.page}${uquery()}" alt="page ${p.page}">
          <div class="num">${p.page}</div>
        </div>
      `).join("");
      for (const t of scoreStrip.querySelectorAll(".page-thumb")) {
        t.addEventListener("click", () => {
          following = false;
          toggleFollow.textContent = "Manual";
          showSystem(parseInt(t.dataset.page, 10), 1);
        });
      }
    }

    function finiteNumber(value) {
      if (value == null || value === "") return null;
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function scoreLocationFromObject(obj, bar) {
      if (!obj && !bar) return null;
      const explicitPage = finiteNumber(obj && obj.page);
      const barPage = finiteNumber(bar && bar.page);
      let page = explicitPage ?? barPage;
      let systemIndex = finiteNumber(obj && (obj.system_on_page ?? obj.system_index));
      if (systemIndex == null) systemIndex = finiteNumber(bar && (bar.system_on_page ?? bar.system_index));
      const rawSystem = finiteNumber((obj && obj.system) ?? (bar && bar.system));
      if (rawSystem != null) {
        if (rawSystem >= 100) {
          if (page == null) page = Math.floor(rawSystem / 100);
          if (systemIndex == null) systemIndex = rawSystem % 100;
        } else if (systemIndex == null && page != null) {
          systemIndex = rawSystem;
        }
      }
      return page != null && systemIndex != null ? { page, systemIndex } : null;
    }

    function referenceLocation(ref) {
      if (!ref) return null;
      const page = finiteNumber(ref.page);
      const systemIndex = finiteNumber(ref.system_on_page ?? ref.system_index);
      return page != null && systemIndex != null ? { page, systemIndex } : null;
    }

    function firstCommentReferenceLocation(comment) {
      for (const ref of (comment && comment.references) || []) {
        const loc = referenceLocation(ref);
        if (loc) return loc;
      }
      return null;
    }

    function elementReferenceLocation(el) {
      const page = finiteNumber(el && el.dataset && el.dataset.page);
      const systemIndex = finiteNumber(el && el.dataset && el.dataset.system_index);
      return page != null && systemIndex != null ? { page, systemIndex } : null;
    }

    function setManualFollow() {
      following = false;
      toggleFollow.textContent = "Manual";
    }

    function showSystem(page, systemIndex) {
      page = finiteNumber(page);
      systemIndex = finiteNumber(systemIndex);
      if (page == null) return false;
      const pageData = pagesData.find(p => Number(p.page) === page);
      if (!pageData) return false;
      const systems = pageData.systems || [];
      const system = systemIndex == null ? systems[0] : systems.find(s => Number(s.system_index) === systemIndex);
      if (!system) return false;
      currentPage = page;
      currentSystem = system ? system.system_index : null;
      nowPageEl.textContent = page;
      nowSystemEl.textContent = currentSystem || "—";
      // Highlight active strip thumb
      for (const t of scoreStrip.querySelectorAll(".page-thumb")) {
        t.classList.toggle("active", parseInt(t.dataset.page, 10) === page);
      }
      // Set the image src if we changed page
      const want = `/lessons/${SESSION_ID}/score-page/${page}${uquery()}`;
      if (!scoreImg.src.endsWith(`/score-page/${page}${uquery()}`)) {
        scoreImg.src = want;
      }
      requestAnimationFrame(() => updateOverlayAndCrop(system));
      return true;
    }

    function updateOverlayAndCrop(system) {
      const stageRect = scoreStage.getBoundingClientRect();
      const sw = stageRect.width;
      if (!sw) return;

      const natural = imageNaturalSizes[currentPage] || { w: scoreImg.naturalWidth, h: scoreImg.naturalHeight };
      if (!natural.w || !natural.h) {
        // wait for image to load
        return;
      }

      // Stage height defaults to the bbox aspect ratio so we never show a sea of whitespace.
      // The stage CSS keeps min-height: 200px; we override here based on what we're showing.
      const padding = 0.04;
      let scale, translateX, translateY, sh, bboxPx = null;

      if (system && system.bbox) {
        const rawY = system.bbox.y * natural.h;
        const rawH = system.bbox.h * natural.h;
        bboxPx = {
          x: system.bbox.x * natural.w,
          y: Math.max(0, rawY),
          w: system.bbox.w * natural.w,
          h: Math.min(natural.h - rawY, rawH),
        };
        // Fit bbox width to stage width with small padding; stage height becomes
        // bbox height at that scale (plus padding) so there's no whitespace.
        scale = (sw * (1 - padding * 2)) / bboxPx.w;
        scale = Math.max(0.4, Math.min(scale, 4.0));
        sh = Math.round(bboxPx.h * scale * (1 + padding * 2));
        sh = Math.max(140, Math.min(sh, 560));
        scoreStage.style.height = `${sh}px`;
        translateX = (sw / 2) - (bboxPx.x + bboxPx.w / 2) * scale;
        translateY = (sh / 2) - (bboxPx.y + bboxPx.h / 2) * scale;
        overlay.classList.add("active");
        overlay.style.left = `${translateX + bboxPx.x * scale}px`;
        overlay.style.top = `${translateY + bboxPx.y * scale}px`;
        overlay.style.width = `${bboxPx.w * scale}px`;
        overlay.style.height = `${bboxPx.h * scale}px`;
      } else {
        // No bbox: show full page, sized to stage width.
        scale = sw / natural.w;
        sh = Math.round(natural.h * scale);
        sh = Math.max(200, Math.min(sh, 800));
        scoreStage.style.height = `${sh}px`;
        translateX = 0;
        translateY = 0;
        overlay.classList.remove("active");
      }

      currentScoreTransform = { translateX, translateY, scale, natural, system: system || null, bboxPx };
      renderAnchorMarkers();
      scoreImg.style.width = `${natural.w}px`;
      scoreImg.style.height = `${natural.h}px`;
      scoreImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    scoreImg.addEventListener("load", () => {
      imageNaturalSizes[currentPage] = { w: scoreImg.naturalWidth, h: scoreImg.naturalHeight };
      const pageData = pagesData.find(p => p.page === currentPage);
      const sys = pageData && currentSystem
        ? (pageData.systems || []).find(s => s.system_index === currentSystem)
        : null;
      updateOverlayAndCrop(sys);
    });

    function findPageAndSystemForMeasure(measure) {
      if (!measure) return null;
      for (const p of pagesData) {
        const ms = p.systems || [];
        for (const s of ms) {
          const f = s.first_measure, l = s.last_measure;
          if (f != null && l != null && f <= measure && measure <= l) {
            return { page: p.page, system: s };
          }
        }
        // fallback: page-level measure range
        if (p.first_measure != null && p.last_measure != null && p.first_measure <= measure && measure <= p.last_measure && (p.systems || []).length) {
          return { page: p.page, system: (p.systems || [])[0] };
        }
      }
      return null;
    }

    function currentMeasureForTime(t) {
      if (!measureTimestamps.length) return null;
      let last = null;
      for (const entry of measureTimestamps) {
        if (entry.start <= t + 0.0001) last = entry.measure;
        else break;
      }
      return last;
    }

    function currentNoteForTime(t) {
      // Walk score_map.notes to find the most recent note whose perf_time <= t.
      // Returns a friendly string like "G5+Bb4+D4+G3" (chord) or "F#5".
      const notes = (scoreMap && scoreMap.notes) || [];
      if (!notes.length) return null;
      let last = null;
      for (const n of notes) {
        const pt = Number(n.perf_time ?? n.performed_time_sec);
        if (!Number.isFinite(pt)) continue;
        if (pt <= t + 0.0001) last = n;
        else break;
      }
      if (!last) return null;
      const names = Array.isArray(last.names) ? last.names : [];
      const display = names.length ? names.join("+") : (last.note_id || "?");
      const conf = last.hmm_confidence || last.confidence || "";
      const confTag = conf && conf !== "high" ? ` (${conf})` : "";
      const measure = last.measure ?? last.midi_measure;
      return measure != null ? `m${measure} ${display}${confTag}` : `${display}${confTag}`;
    }

    function followCurrentTime() {
      const t = video.currentTime;
      const m = currentMeasureForTime(t);
      const noteEl = document.getElementById("now-note");
      if (noteEl) {
        const noteText = currentNoteForTime(t);
        noteEl.textContent = noteText || "—";
      }
      if (m == null) {
        nowMeasureEl.textContent = "—";
        return;
      }
      nowMeasureEl.textContent = m;
      if (!following) return;
      const found = findPageAndSystemForMeasure(m);
      if (!found) return;
      if (found.page !== currentPage || (found.system && found.system.system_index !== currentSystem)) {
        showSystem(found.page, found.system ? found.system.system_index : 1);
      }
    }

    function commentStart(c) { return Number(c.start ?? c.start_sec ?? 0) || 0; }
    function commentEnd(c) { return Number(c.end ?? c.end_sec ?? (commentStart(c) + 2)) || (commentStart(c) + 2); }
    function commentSeverity(c) { return String(c.severity || "info").toLowerCase().replace(/[^a-z]/g, "") || "info"; }
    function noteRefId(ref) { return typeof ref === "string" ? ref : String((ref && (ref.note_id || ref.id || ref.pitch_name)) || ""); }
    function updateCommentCount() {
      const visible = comments.filter(c => severityVisible.has(commentSeverity(c))).length;
      commentCount.textContent = comments.length ? `${visible}/${comments.length} note(s)` : "—";
    }
    function setupSeverityFilter() {
      const box = document.getElementById("severity-filter");
      if (!box) return;
      for (const btn of box.querySelectorAll(".severity-chip")) {
        btn.addEventListener("click", () => {
          const sev = btn.dataset.severity;
          if (severityVisible.has(sev)) severityVisible.delete(sev); else severityVisible.add(sev);
          btn.classList.toggle("active", severityVisible.has(sev));
          applySeverityFilter();
          renderTimelineMarkers();
        });
      }
    }
    function applySeverityFilter() {
      const list = document.getElementById("comments-list");
      if (!list) return;
      let visible = 0;
      for (const li of list.querySelectorAll(".comment")) {
        const show = severityVisible.has(li.dataset.severity || "info");
        li.style.display = show ? "" : "none";
        if (show) visible += 1;
      }
      let empty = list.querySelector(".severity-empty");
      if (!visible) {
        if (!empty) {
          empty = document.createElement("li");
          empty.className = "empty severity-empty";
          empty.textContent = "No comments match the selected severities.";
          list.appendChild(empty);
        }
      } else if (empty) empty.remove();
      updateCommentCount();
    }
    function renderDropped(dropped) {
      const host = document.getElementById("dropped-wrap");
      if (!host) return;
      if (!Array.isArray(dropped) || !dropped.length) { host.innerHTML = ""; return; }
      host.innerHTML = `<button type="button" class="tiny-chip" id="dropped-toggle">${dropped.length} dropped</button><div class="dropped-list" id="dropped-list">${dropped.map(d => `<div class="dropped-item"><span class="id">${escapeHtml(d.id || "dropped")}</span> — ${escapeHtml(d.reason || d.text || "No reason supplied")}</div>`).join("")}</div>`;
      const toggle = document.getElementById("dropped-toggle");
      const list = document.getElementById("dropped-list");
      toggle && toggle.addEventListener("click", () => { list.classList.toggle("open"); toggle.classList.toggle("active", list.classList.contains("open")); });
    }

    function setScoreMap(map) {
      scoreMap = map && typeof map === "object" ? map : null;
      scoreMapNoteById = new Map();
      for (const n of (scoreMap && scoreMap.notes) || []) if (n && n.note_id) scoreMapNoteById.set(String(n.note_id), n);
      renderAnchorMarkers();
    }

    function toolCallLabel(call) {
      const name = call.tool || call.name || "tool";
      const args = call.args || {};
      if (args.measure || args.midi_measure) return `${name} checked bar ${args.measure || args.midi_measure}`;
      if (args.start_sec != null || args.end_sec != null) return `${name} from ${args.start_sec ?? "?"}–${args.end_sec ?? "?"}s`;
      return name;
    }
    function formatCost(value) {
      const n = Number(value);
      return Number.isFinite(n) ? `$${n.toFixed(4)}` : "$—";
    }

    // ----- Per-comment reply threads -----
    function threadHtml(commentId) {
      const placeholder = commentId
        ? "Reply to this comment…"
        : "Ask a general follow-up about this lesson…";
      const clipBtn = commentId
        ? `<button type="button" class="clip-upload-btn" title="Upload a practice clip for this comment">🎤</button>
           <input type="file" class="clip-upload-input" accept="video/*,audio/*" hidden>`
        : "";
      return `
        <div class="thread" data-thread-cid="${commentId || ''}">
          <div class="thread-messages"></div>
          <form class="thread-input-row">
            ${clipBtn}
            <textarea class="thread-input" maxlength="2048" placeholder="${placeholder}"></textarea>
            <button type="submit" class="thread-send">Send</button>
          </form>
        </div>
      `;
    }

    function appendThreadMessage(messagesEl, role, text, opts = {}) {
      const meta = opts.metadata || {};
      // Drill upload / result messages get distinct styling so users can
      // tell at a glance that a bubble is about a practice clip rather
      // than plain text chat.
      if (meta.type === "drill_upload") {
        const div = document.createElement("div");
        const state = meta.state || "processing";
        const isFailed = state === "failed";
        div.className = `drill-bubble${isFailed ? " error" : ""}`;
        div.dataset.drillId = meta.drill_session_id || "";
        div.dataset.drillBubble = "upload";
        const stateLabel = state === "processing" ? "ANALYSING" : state.toUpperCase();
        const retry = isFailed
          ? `<span class="drill-retry-link" data-retry-drill="${meta.drill_session_id || ''}">↻ Retry</span>`
          : "";
        const err = meta.error ? `<div class="drill-error" style="margin-top:4px">${escapeHtml(String(meta.error))}</div>` : "";
        div.innerHTML = `🎤 ${escapeHtml(text)}<span class="drill-state-tag">${stateLabel}</span>${retry}${err}`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }
      if (meta.type === "drill_result") {
        const div = document.createElement("div");
        const isFailed = meta.state === "failed";
        div.className = `chat-msg teacher${isFailed ? " error" : ""}`;
        div.dataset.drillId = meta.drill_session_id || "";
        div.innerHTML = `<span class="gemini">✦</span><span class="drill-source-tag">🎤 from practice clip</span>${escapeHtml(text)}`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }
      const div = document.createElement("div");
      div.className = `chat-msg ${role === "user" ? "user" : "teacher"}${opts.error ? " error" : ""}`;
      const toolCalls = opts.tool_calls || [];
      const usage = opts.usage || null;
      const toolHtml = toolCalls.length
        ? `<details><summary>🔧 ${toolCalls.length} tool call${toolCalls.length === 1 ? "" : "s"}</summary>${toolCalls.map(c => `<div>${escapeHtml(toolCallLabel(c))}</div>`).join("")}</details>`
        : "";
      const cachedTag = usage && usage.cached_tokens ? ` · ${usage.cached_tokens} cached` : "";
      const costHtml = usage ? `<div class="cost">${escapeHtml(usage.model || "model")} · ${usage.input_tokens ?? "?"} in / ${usage.output_tokens ?? "?"} out${cachedTag} · ${formatCost(usage.estimated_cost_usd)}</div>` : "";
      div.innerHTML = `${role === "teacher" ? `<span class="gemini">✦</span>` : ""}${escapeHtml(text)}${toolHtml}${costHtml}`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function loadThreadHistory(commentId, messagesEl) {
      const state = getThread(commentId);
      if (state.loaded) return;
      state.loaded = true;
      messagesEl.innerHTML = "";
      try {
        let history;
        if (commentId) {
          history = await fetchOptionalJson(`/lessons/${SESSION_ID}/chat/comment/${encodeURIComponent(commentId)}`, { messages: [] });
        } else {
          // General lesson thread: load the most recent non-comment conversation.
          const conversations = await fetchOptionalJson(`/lessons/${SESSION_ID}/chat`, []);
          const general = (conversations || []).find(c => !(c.conversation_id || c.id || "").startsWith("cmt_"));
          if (general) {
            history = await fetchJson(`/lessons/${SESSION_ID}/chat/${encodeURIComponent(general.conversation_id || general.id)}`);
            state.conversationId = general.conversation_id || general.id;
          } else {
            history = { messages: [] };
          }
        }
        state.messages = history.messages || [];
        for (const msg of state.messages) {
          appendThreadMessage(messagesEl, msg.role, msg.content, { tool_calls: msg.tool_calls || [], usage: msg.usage, metadata: msg.metadata || {} });
        }
        if (!state.messages.length) {
          const empty = document.createElement("div");
          empty.className = "thread-empty";
          empty.textContent = commentId
            ? "No replies yet. Ask the teacher a follow-up about this specific comment."
            : "No general questions yet. Ask the teacher anything about this lesson.";
          messagesEl.appendChild(empty);
        }
      } catch (error) {
        appendThreadMessage(messagesEl, "teacher", error.message || String(error), { error: true });
      }
    }

    async function sendThreadMessage(commentId, threadEl, message) {
      const state = getThread(commentId);
      if (state.busy) return;
      state.busy = true;
      const messagesEl = threadEl.querySelector(".thread-messages");
      const sendBtn = threadEl.querySelector(".thread-send");
      const inputEl = threadEl.querySelector(".thread-input");
      const emptyEl = messagesEl.querySelector(".thread-empty");
      if (emptyEl) emptyEl.remove();
      sendBtn.disabled = true;
      appendThreadMessage(messagesEl, "user", message);
      const typing = appendThreadMessage(messagesEl, "teacher", "Thinking…");
      typing.classList.add("typing");
      const typingText = typing;
      const startedAt = Date.now();
      const timer = setInterval(() => {
        const sec = Math.floor((Date.now() - startedAt) / 1000);
        let label = sec < 20 ? `Thinking… ${sec}s`
          : sec < 60 ? `Thinking… ${sec}s — agentic responses can take 30-90s`
          : sec < 120 ? `Thinking… ${sec}s — still working (Gemini may be slow during peak hours)`
          : `Thinking… ${sec}s — this is unusually long; you can keep waiting or refresh`;
        typingText.innerHTML = `<span class="gemini">✦</span>${escapeHtml(label)}`;
      }, 1000);
      try {
        const body = { message };
        if (commentId) body.comment_id = commentId;
        else if (state.conversationId) body.conversation_id = state.conversationId;
        const payload = await postJson(`/lessons/${SESSION_ID}/chat`, body);
        clearInterval(timer);
        typing.remove();
        if (payload.conversation_id) state.conversationId = payload.conversation_id;
        appendThreadMessage(messagesEl, "teacher", payload.reply || "", { tool_calls: payload.tool_calls || [], usage: payload.usage });
        // Bump the reply count badge on the comment card if present.
        const card = commentId ? document.querySelector(`.comment[data-id="${commentId}"]`) : document.querySelector(".lesson-general-card");
        if (card) {
          const badge = card.querySelector(".reply-count");
          if (badge) {
            const n = (parseInt(badge.dataset.n || "0", 10) || 0) + 2;
            badge.dataset.n = String(n);
            badge.textContent = `${n} ${n === 1 ? "message" : "messages"}`;
          }
        }
      } catch (error) {
        clearInterval(timer);
        typing.remove();
        appendThreadMessage(messagesEl, "teacher", error.message || String(error), { error: true, usage: error.payload && error.payload.usage });
      } finally {
        state.busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function uploadPracticeClip(commentId, threadEl, file) {
      const state = getThread(commentId);
      const messagesEl = threadEl.querySelector(".thread-messages");
      const emptyEl = messagesEl.querySelector(".thread-empty");
      if (emptyEl) emptyEl.remove();
      const bubble = appendThreadMessage(messagesEl, "system", "Uploading practice clip…", {
        metadata: { type: "drill_upload", state: "processing" },
      });
      try {
        const form = new FormData();
        form.append("file", file, file.name || "clip.mp4");
        const resp = await fetch(`/lessons/${SESSION_ID}/comments/${encodeURIComponent(commentId)}/practice-clip`, {
          method: "POST",
          body: form,
        });
        if (!resp.ok) {
          const detail = await resp.text();
          throw new Error(`Upload failed (${resp.status}): ${detail}`);
        }
        const payload = await resp.json();
        bubble.dataset.drillId = payload.drill_session_id;
        bubble.innerHTML = `🎤 Practice clip uploaded — analysing your practice clip…<span class="drill-state-tag">PROCESSING</span>`;
        startDrillPolling(commentId, threadEl, payload.drill_session_id);
      } catch (err) {
        bubble.classList.add("error");
        bubble.innerHTML = `❌ ${escapeHtml(err.message || String(err))}`;
      }
    }

    const _drillPolling = new Map();
    function startDrillPolling(commentId, threadEl, drillId) {
      if (_drillPolling.has(drillId)) return;
      const messagesEl = threadEl.querySelector(".thread-messages");
      const intervalId = setInterval(async () => {
        try {
          const status = await fetch(`/drills/${encodeURIComponent(drillId)}/status`).then(r => r.json());
          if (status.state === "ready") {
            clearInterval(intervalId);
            _drillPolling.delete(drillId);
            // Reload the thread history to pick up the drill_result reply.
            const state = getThread(commentId);
            state.loaded = false;
            messagesEl.innerHTML = "";
            loadThreadHistory(commentId, messagesEl);
          } else if (status.state === "failed") {
            clearInterval(intervalId);
            _drillPolling.delete(drillId);
            const state = getThread(commentId);
            state.loaded = false;
            messagesEl.innerHTML = "";
            loadThreadHistory(commentId, messagesEl);
          }
        } catch (err) {
          // Transient: keep polling
        }
      }, 5000);
      _drillPolling.set(drillId, intervalId);
    }

    async function retryDrill(drillId) {
      try {
        await fetch(`/drills/${encodeURIComponent(drillId)}/retry`, { method: "POST" });
      } catch (err) { /* ignore */ }
    }

    function wireThread(threadEl) {
      const commentId = threadEl.dataset.threadCid || null;
      const messagesEl = threadEl.querySelector(".thread-messages");
      const formEl = threadEl.querySelector(".thread-input-row");
      const inputEl = threadEl.querySelector(".thread-input");
      const clipBtn = threadEl.querySelector(".clip-upload-btn");
      const clipInput = threadEl.querySelector(".clip-upload-input");
      // Lazy-load history when the thread is first opened.
      loadThreadHistory(commentId, messagesEl).then(() => {
        // After loading, if any drill_upload bubbles are still in
        // "processing" state, poll their drills so the UI catches up.
        if (commentId) {
          for (const bubble of messagesEl.querySelectorAll(".drill-bubble[data-drill-bubble='upload']")) {
            const tag = bubble.querySelector(".drill-state-tag");
            const stateText = (tag?.textContent || "").trim().toLowerCase();
            const drillId = bubble.dataset.drillId;
            if (drillId && (stateText === "analysing" || stateText === "processing")) {
              startDrillPolling(commentId, threadEl, drillId);
            }
          }
        }
      });
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = `${Math.min(inputEl.scrollHeight, 110)}px`;
      });
      formEl.addEventListener("submit", (event) => {
        event.preventDefault();
        const msg = (inputEl.value || "").trim();
        if (!msg) return;
        if (new Blob([msg]).size > 2048) {
          appendThreadMessage(messagesEl, "teacher", "Please keep questions under 2 KB.", { error: true });
          return;
        }
        inputEl.value = "";
        inputEl.style.height = "auto";
        sendThreadMessage(commentId, threadEl, msg);
      });
      inputEl.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") formEl.requestSubmit();
      });
      if (clipBtn && clipInput && commentId) {
        clipBtn.addEventListener("click", (e) => { e.preventDefault(); clipInput.click(); });
        clipInput.addEventListener("change", () => {
          const f = clipInput.files && clipInput.files[0];
          if (!f) return;
          clipInput.value = "";
          uploadPracticeClip(commentId, threadEl, f);
        });
      }
      // Retry link on a failed drill bubble.
      messagesEl.addEventListener("click", async (event) => {
        const t = event.target;
        if (t && t.dataset && t.dataset.retryDrill) {
          const did = t.dataset.retryDrill;
          await retryDrill(did);
          const state = getThread(commentId);
          state.loaded = false;
          messagesEl.innerHTML = "";
          loadThreadHistory(commentId, messagesEl);
          if (commentId) startDrillPolling(commentId, threadEl, did);
        }
      });
    }

    function scoreMapBarsForCurrentSystem() {
      if (!scoreMap || !Array.isArray(scoreMap.bars) || !currentPage || !currentSystem) return [];
      return scoreMap.bars.filter(b => {
        const loc = scoreLocationFromObject(b);
        return loc && Number(loc.page) === Number(currentPage) && Number(loc.systemIndex) === Number(currentSystem);
      });
    }
    function scoreMapSystemForNote(note) {
      if (!note) return null;
      const noteMeasure = Number(note.measure ?? note.midi_measure);
      const notePage = finiteNumber(note.page);
      const bar = ((scoreMap && scoreMap.bars) || []).find(b =>
        Number(b.measure ?? b.midi_measure) === noteMeasure &&
        (notePage == null || Number(b.page) === notePage)
      );
      return scoreLocationFromObject(note, bar);
    }
    function noteFraction(note) {
      if (note.x_frac != null && note.x_frac_end != null) return [(Number(note.x_frac) + Number(note.x_frac_end)) / 2, Math.max(0.012, Number(note.x_frac_end) - Number(note.x_frac))];
      const bar = ((scoreMap && scoreMap.bars) || []).find(b => Number(b.measure ?? b.midi_measure) === Number(note.measure ?? note.midi_measure));
      if (!bar) return [0.5, 0.02];
      const span = bar.highlight_x_frac || [Number(bar.first_bar_x_pad_frac || 0.06), 1 - Number(bar.trailing_x_pad_frac || 0.04)];
      const beat = Number(note.beat_in_bar ?? note.beat ?? 1);
      const frac = Math.max(0, Math.min(1, (beat - 1) / 4));
      return [Number(span[0]) + (Number(span[1]) - Number(span[0])) * frac, 0.025];
    }
    function systemBoxPixels() {
      if (!currentScoreTransform || !currentScoreTransform.bboxPx) return null;
      const t = currentScoreTransform;
      return { left: t.translateX + t.bboxPx.x * t.scale, top: t.translateY + t.bboxPx.y * t.scale, width: t.bboxPx.w * t.scale, height: t.bboxPx.h * t.scale };
    }
    function renderAnchorMarkers() {
      if (!anchorMarkers) return;
      anchorMarkers.innerHTML = "";
      const box = systemBoxPixels();
      if (!box) return;
      // anchor-markers logic: derive bar boundary markers from score_map.bars for the current system.
      for (const b of scoreMapBarsForCurrentSystem()) {
        const xFrac = Number((b.highlight_x_frac || [0, 1])[0]);
        const x = box.left + xFrac * box.width;
        const line = document.createElement("div");
        line.className = "score-anchor-line";
        line.style.left = `${x}px`;
        line.style.top = `${box.top}px`;
        line.style.height = `${box.height}px`;
        anchorMarkers.appendChild(line);
        const label = document.createElement("div");
        label.className = "score-anchor-label";
        label.style.left = `${x}px`;
        label.style.top = `${Math.max(2, box.top - 16)}px`;
        label.textContent = b.measure ?? b.midi_measure ?? "";
        anchorMarkers.appendChild(label);
      }
    }
    function resolveCommentNotes(comment) {
      const refs = Array.isArray(comment.note_refs) ? comment.note_refs : [];
      const out = [];
      for (const ref of refs) {
        const id = noteRefId(ref);
        if (id && scoreMapNoteById.has(id)) out.push(scoreMapNoteById.get(id));
      }
      if (!out.length) {
        for (const r of (comment.references || [])) {
          const found = ((scoreMap && scoreMap.notes) || []).find(n => Number(n.measure ?? n.midi_measure) === Number(r.measure) && (!r.note_name || (n.names || []).includes(r.note_name)) && (r.beat == null || Math.abs(Number(n.beat_in_bar || 0) - Number(r.beat)) < 0.18));
          if (found) out.push(found);
        }
      }
      return out;
    }
    function paintNoteRefBands(notes) {
      clearNoteRefHighlights();
      const box = systemBoxPixels();
      if (!box || !notes.length) return;
      const bars = scoreMapBarsForCurrentSystem();
      const systemIds = new Set(bars.map(b => finiteNumber(b.system)).filter(n => n != null));
      for (const note of notes) {
        const loc = scoreMapSystemForNote(note);
        if (loc && Number(loc.page) !== Number(currentPage)) continue;
        if (loc && Number(loc.systemIndex) !== Number(currentSystem) && !systemIds.has(Number(note.system))) continue;
        const [xFrac, fracWidth] = noteFraction(note);
        const w = Math.max(8, fracWidth * box.width * 1.8);
        const x = box.left + xFrac * box.width - w / 2;
        const band = document.createElement("div");
        band.className = "score-note-band";
        band.style.left = `${x}px`;
        band.style.top = `${box.top}px`;
        band.style.width = `${w}px`;
        band.style.height = `${box.height}px`;
        band.title = note.note_id || "note reference";
        noteRefOverlays.appendChild(band);
      }
    }
    function showNoteRefHighlights(comment, preferredLoc) {
      const notes = resolveCommentNotes(comment);
      const explicitLoc = preferredLoc || firstCommentReferenceLocation(comment);
      const firstLoc = explicitLoc || (notes.length ? scoreMapSystemForNote(notes[0]) : null);
      if (firstLoc && (firstLoc.page !== currentPage || firstLoc.systemIndex !== currentSystem)) {
        setManualFollow();
        if (showSystem(firstLoc.page, firstLoc.systemIndex) && notes.length) {
          requestAnimationFrame(() => paintNoteRefBands(notes));
        }
      } else if (notes.length) paintNoteRefBands(notes);
    }
    function clearNoteRefHighlights() { if (noteRefOverlays) noteRefOverlays.innerHTML = ""; }

    function renderToolCalls(payload) {
      const panel = document.getElementById("tool-calls-panel");
      const list = document.getElementById("tool-call-list");
      const count = document.getElementById("tool-call-count");
      const calls = Array.isArray(payload) ? payload : (payload && (payload.tool_calls || payload.calls || payload.items)) || [];
      if (!panel || !list || !Array.isArray(calls) || !calls.length) { if (panel) panel.style.display = "none"; return; }
      panel.style.display = "block";
      count.textContent = `${calls.length} call${calls.length === 1 ? "" : "s"}`;
      list.innerHTML = calls.map((call, i) => {
        const status = String(call.status || (call.error ? "error" : "ok")).toLowerCase();
        const args = call.args == null ? {} : call.args;
        const duration = call.duration_sec != null ? ` · ${Number(call.duration_sec).toFixed(2)}s` : "";
        return `<div class="tool-call"><div class="top"><span class="name">${escapeHtml(call.tool || call.name || `tool_${i+1}`)}</span><span class="tool-status ${status === "error" ? "error" : "ok"}">${escapeHtml(status)}</span><span class="turn">turn ${escapeHtml(call.turn ?? "?")}${duration}</span></div><pre>${escapeHtml(JSON.stringify(args, null, 0))}</pre></div>`;
      }).join("");
    }

    function renderComments(payload) {
      lastCommentsPayload = payload || {};
      comments = payload.comments || [];
      measureTimestamps = payload.measure_timestamps || [];
      const meta = payload._meta || {};
      const alignTag = document.getElementById("alignment-tag");
      if (meta.measure_timestamps_source === "chroma_dtw") {
        alignTag.className = "alignment-tag dtw";
        alignTag.textContent = "MIDI-aligned ✓";
        alignTag.title = "Score follows playback via deterministic chroma DTW against reference MIDI.";
      } else {
        alignTag.className = "alignment-tag llm";
        alignTag.textContent = "estimated";
        alignTag.title = "No MIDI alignment available; following uses the teacher's listening estimates.";
      }
      updateCommentCount();
      summaryBox.textContent = (payload.summary || "").trim() || "No summary yet.";
      const progress = (payload.progress_notes || "").trim();
      if (progress) {
        progressNotesBox.style.display = "block";
        progressNotesBox.textContent = progress;
      } else {
        progressNotesBox.style.display = "none";
      }
      const cost = (payload._meta || {}).estimated_cost_usd;
      if (cost != null) {
        costTag.textContent = `~$${Number(cost).toFixed(3)}`;
      }

      const lesson = payload.lesson || {};
      const lessonBox = document.getElementById("lesson-detail");
      const sections = [];
      const blocker = payload.lesson_blocker;
      if (blocker && blocker.message) {
        const kind = String(blocker.kind || "blocker").replace(/_/g, " ");
        sections.push(`<div class="lesson-section lesson-blocker"><h4>⚠ Lesson can't proceed — ${escapeHtml(kind)}</h4><div>${escapeHtml(blocker.message)}</div></div>`);
      }
      if (lesson.artistic_summary) {
        sections.push(`<div class="lesson-section"><h4>Artistic reading</h4><div>${escapeHtml(lesson.artistic_summary)}</div></div>`);
      }
      if (lesson.repertoire_fit && lesson.repertoire_fit.verdict) {
        const v = String(lesson.repertoire_fit.verdict);
        const expl = lesson.repertoire_fit.explanation || "";
        const alts = Array.isArray(lesson.repertoire_fit.suggested_alternatives) ? lesson.repertoire_fit.suggested_alternatives : [];
        let altHtml = "";
        if (alts.length) {
          altHtml = `<div class="alts"><div class="alts-label">Suggested alternatives:</div><ul>${alts.map(a => `<li><strong>${escapeHtml(a.piece || "")}</strong>${a.why ? " — " + escapeHtml(a.why) : ""}</li>`).join("")}</ul></div>`;
        }
        sections.push(`<div class="lesson-section repertoire-fit fit-${v}"><h4>Repertoire fit · <span class="verdict">${escapeHtml(v.replace(/_/g, " "))}</span></h4><div>${escapeHtml(expl)}</div>${altHtml}</div>`);
      }
      if (Array.isArray(lesson.what_works) && lesson.what_works.length) {
        sections.push(`<div class="lesson-section"><h4>What's working</h4><ul>${lesson.what_works.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul></div>`);
      }
      if (Array.isArray(lesson.areas_to_develop) && lesson.areas_to_develop.length) {
        const items = lesson.areas_to_develop.map(a => {
          const pri = (a.priority || "medium").toLowerCase();
          return `<div class="area"><span class="focus">${escapeHtml(a.focus || "")}</span><span class="priority ${pri}">${pri}</span><div class="ex">${escapeHtml(a.exercise || "")}</div></div>`;
        }).join("");
        sections.push(`<div class="lesson-section"><h4>Areas to develop</h4>${items}</div>`);
      }
      if (Array.isArray(lesson.this_week_practice) && lesson.this_week_practice.length) {
        sections.push(`<div class="lesson-section"><h4>This week's practice</h4><ul>${lesson.this_week_practice.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul></div>`);
      }
      if (Array.isArray(lesson.suggested_etudes) && lesson.suggested_etudes.length) {
        const items = lesson.suggested_etudes.map(e => {
          const mins = e.minutes_per_day ? ` <span class="mins">${escapeHtml(String(e.minutes_per_day))} min/day</span>` : "";
          const why = e.addresses ? `<div class="why">${escapeHtml(e.addresses)}</div>` : "";
          return `<div class="etude"><div class="piece"><strong>${escapeHtml(e.piece || "")}</strong>${mins}</div>${why}</div>`;
        }).join("");
        sections.push(`<div class="lesson-section"><h4>Prescribed studies (technique homework)</h4>${items}</div>`);
      }
      if (lesson.next_take) {
        sections.push(`<div class="lesson-section"><h4>For next take</h4><div>${escapeHtml(lesson.next_take)}</div></div>`);
      }
      if (sections.length) {
        lessonBox.style.display = "block";
        lessonBox.innerHTML = sections.join("");
      } else {
        lessonBox.style.display = "none";
        lessonBox.innerHTML = "";
      }
      if (!comments.length) {
        commentsHost.innerHTML = `<div class="empty">No teacher comments yet.</div><div class="dropped-wrap" id="dropped-wrap"></div>`;
        renderDropped(payload.dropped || []);
        return;
      }
      commentsHost.innerHTML = `
        <div class="severity-filter" id="severity-filter" data-feature="severity-filter">
          <span class="label">severity</span>
          ${["info", "warn", "alert"].map(sev => `<button type="button" class="severity-chip ${severityVisible.has(sev) ? "active" : ""}" data-severity="${sev}">${sev}</button>`).join("")}
        </div>
        <ul class="comments" id="comments-list"></ul>
        <div class="dropped-wrap" id="dropped-wrap"></div>
      `;
      setupSeverityFilter();
      renderDropped(payload.dropped || []);
      const list = document.getElementById("comments-list");
      list.innerHTML = comments.map((c) => {
        const refs = (c.references || []).filter(r => r.measure != null);
        const noteRefs = Array.isArray(c.note_refs) ? c.note_refs : [];
        const loc = firstCommentReferenceLocation(c);
        const pageAttr = loc ? ` data-page="${loc.page}" data-system_index="${loc.systemIndex}"` : "";
        const refsHtml = (refs.length || noteRefs.length)
          ? `<div class="refs">${refs.map((r, i) => {
              const label = [
                r.note_name || "note",
                r.measure ? `m.${r.measure}` : "",
                r.beat ? `beat ${r.beat}` : "",
                r.hand || "",
              ].filter(Boolean).join(" · ");
              return `<span class="ref-chip" data-cid="${c.id}" data-rindex="${i}">${escapeHtml(label)}</span>`;
            }).join("")}${noteRefs.map(n => `<span class="ref-chip note-ref-chip" data-cid="${c.id}" data-note-ref="${escapeHtml(noteRefId(n))}">${escapeHtml(noteRefId(n))}</span>`).join("")}</div>`
          : "";
        return `
          <li class="comment" data-id="${c.id}" data-start="${commentStart(c)}" data-severity="${commentSeverity(c)}"${pageAttr}>
            <div class="row1">
              <span class="ts">${fmtTime(commentStart(c))}</span>
              <span class="cat">${c.category || "note"}</span>
              <span class="sev ${commentSeverity(c)}">${commentSeverity(c)}</span>
              ${c.measure ? `<span class="measure">m. ${c.measure}</span>` : ""}
            </div>
            <div class="summary-line">${escapeHtml(c.summary || "")}</div>
            <div class="text">${escapeHtml(c.text || "")}</div>
            ${refsHtml}
            <div class="comment-thread-toggle">
              <button type="button" class="reply-toggle" data-cid="${c.id}">💬 Reply</button>
              <span class="reply-count" data-n="0"></span>
            </div>
            <div class="comment-thread-host" data-cid="${c.id}" hidden></div>
          </li>
        `;
      }).join("") + `
        <li class="comment lesson-general-card" data-id="__general__">
          <div class="row1">
            <span class="cat">general</span>
            <span class="summary-line" style="flex:1">Ask a general follow-up about this lesson</span>
          </div>
          <div class="text">Not tied to a specific comment? Start a general thread with the teacher about this lesson.</div>
          <div class="comment-thread-toggle">
            <button type="button" class="reply-toggle" data-cid="">💬 Open</button>
            <span class="reply-count" data-n="0"></span>
          </div>
          <div class="comment-thread-host" data-cid="" hidden></div>
        </li>
      `;
      for (const li of list.querySelectorAll(".comment")) {
        if (li.classList.contains("lesson-general-card")) continue;
        li.addEventListener("click", (event) => {
          // Don't seek when the user is interacting with the inline reply
          // thread (toggle button, message bubbles, input, send button).
          if (event.target.closest(".comment-thread-toggle, .comment-thread-host, .ref-chip")) return;
          const c = comments.find(x => x.id === li.dataset.id);
          if (!c) return;
          seekTo(parseFloat(li.dataset.start));
          if (c.references && c.references.length) {
            setManualFollow();
            highlightReference(c.references[0]);
          }
        });
        li.addEventListener("mouseenter", () => {
          const c = comments.find(x => x.id === li.dataset.id);
          if (c) showNoteRefHighlights(c, elementReferenceLocation(li));
        });
        li.addEventListener("mouseleave", clearNoteRefHighlights);
      }
      // Hook the reply toggles (both per-comment and the bottom general card).
      for (const btn of list.querySelectorAll(".reply-toggle")) {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          const cid = btn.dataset.cid || "";
          const host = list.querySelector(`.comment-thread-host[data-cid="${cid}"]`);
          if (!host) return;
          if (host.hidden) {
            host.hidden = false;
            if (!host.dataset.mounted) {
              host.dataset.mounted = "1";
              host.innerHTML = threadHtml(cid || null);
              const threadEl = host.querySelector(".thread");
              wireThread(threadEl);
            }
            btn.textContent = "💬 Hide";
            host.querySelector(".thread-input")?.focus();
          } else {
            host.hidden = true;
            btn.textContent = cid ? "💬 Reply" : "💬 Open";
          }
        });
      }
      // Fetch conversation list once to surface reply counts on cards.
      fetchOptionalJson(`/lessons/${SESSION_ID}/chat`, []).then(convs => {
        if (!Array.isArray(convs)) return;
        for (const conv of convs) {
          const id = conv.conversation_id || conv.id || "";
          const n = conv.message_count || 0;
          if (!n) continue;
          let card;
          if (id.startsWith("cmt_")) {
            const cid = id.slice(4);
            card = list.querySelector(`.comment[data-id="${cid}"]`);
          } else {
            card = list.querySelector(".lesson-general-card");
          }
          if (!card) continue;
          const badge = card.querySelector(".reply-count");
          if (badge) {
            badge.dataset.n = String(n);
            badge.textContent = `${n} ${n === 1 ? "message" : "messages"}`;
          }
        }
      }).catch(() => {});
      applySeverityFilter();
      for (const chip of list.querySelectorAll(".ref-chip")) {
        chip.addEventListener("mouseenter", () => {
          const c = comments.find(x => x.id === chip.dataset.cid);
          if (!c) return;
          const r = (c.references || [])[parseInt(chip.dataset.rindex, 10)];
          if (r) {
            setManualFollow();
            highlightReference(r);
          }
        });
        chip.addEventListener("click", () => {
          const c = comments.find(x => x.id === chip.dataset.cid);
          if (!c) return;
          const r = (c.references || [])[parseInt(chip.dataset.rindex, 10)];
          if (r) {
            setManualFollow();
            highlightReference(r);
          }
        });
      }
      for (const chip of list.querySelectorAll(".note-ref-chip")) {
        chip.addEventListener("mouseenter", () => {
          const c = comments.find(x => x.id === chip.dataset.cid);
          if (c) showNoteRefHighlights(c);
        });
        chip.addEventListener("mouseleave", clearNoteRefHighlights);
      }
      renderTimelineMarkers();
    }

    function highlightReference(ref) {
      const loc = referenceLocation(ref);
      if (loc) {
        showSystem(loc.page, loc.systemIndex);
        return;
      }
      const page = finiteNumber(ref && ref.page);
      if (page != null) {
        showSystem(page, null);
        return;
      }
      const found = findPageAndSystemForMeasure(ref.measure);
      if (found) showSystem(found.page, found.system ? found.system.system_index : 1);
    }

    function renderTimelineMarkers() {
      for (const m of timeline.querySelectorAll(".marker")) m.remove();
      if (!isFinite(video.duration) || !video.duration) return;
      for (const c of comments) {
        const start = commentStart(c);
        if (start > video.duration || !severityVisible.has(commentSeverity(c))) continue;
        const left = (start / video.duration) * 100;
        const m = document.createElement("div");
        m.className = "marker";
        m.style.left = `${left}%`;
        m.title = `${fmtTime(start)} · ${c.summary || ""}`;
        m.dataset.id = c.id;
        m.addEventListener("click", (e) => { e.stopPropagation(); seekTo(start); });
        timeline.appendChild(m);
      }
    }

    function seekTo(seconds) {
      if (!isFinite(seconds)) return;
      const target = Math.max(0, Math.min(seconds, (video.duration || seconds) - 0.05));
      try { video.pause(); } catch (_) {}
      video.currentTime = target;
      try { video.play().catch(() => {}); } catch (_) {}
      following = true;
      toggleFollow.textContent = "Following ✓";
      highlightActive(target);
      followCurrentTime();
    }

    function highlightActive(t) {
      let active = null;
      for (const c of comments) {
        const start = commentStart(c), end = commentEnd(c);
        if (t + 0.001 >= start && (!end || t < end + 0.5)) active = c;
      }
      if (active && active.id === activeComment) return;
      activeComment = active && active.id;
      const list = document.getElementById("comments-list");
      if (!list) return;
      for (const li of list.querySelectorAll(".comment")) {
        li.classList.toggle("active", li.dataset.id === activeComment);
      }
      for (const m of timeline.querySelectorAll(".marker")) {
        m.classList.toggle("active", m.dataset.id === activeComment);
      }
    }

    timeline.addEventListener("click", (e) => {
      if (e.target.classList && e.target.classList.contains("marker")) return;
      const rect = timeline.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      if (isFinite(video.duration)) seekTo(ratio * video.duration);
    });

    video.addEventListener("loadedmetadata", renderTimelineMarkers);
    video.addEventListener("timeupdate", () => {
      if (!isFinite(video.duration) || !video.duration) return;
      progressBar.style.width = `${(video.currentTime / video.duration) * 100}%`;
      highlightActive(video.currentTime);
      followCurrentTime();
    });
    window.addEventListener("resize", () => {
      const pageData = pagesData.find(p => p.page === currentPage);
      const sys = pageData && currentSystem
        ? (pageData.systems || []).find(s => s.system_index === currentSystem)
        : null;
      updateOverlayAndCrop(sys);
    });

    function renderScore(prep) {
      prepDoc = prep || {};
      pagesData = ((prep && prep.pages) || []).filter(p => !p.kind || p.kind === "music");
      const totalSystems = pagesData.reduce((acc, p) => acc + ((p.systems || []).length), 0);
      scoreInfo.textContent = `${pagesData.length} page · ${totalSystems} system${totalSystems === 1 ? "" : "s"}`;
      renderScoreStrip();
      if (pagesData.length) {
        const firstPage = pagesData[0];
        const firstSystem = (firstPage.systems || [])[0];
        showSystem(firstPage.page, firstSystem ? firstSystem.system_index : 1);
      }
    }

    async function loadAll() {
      try {
        const payload = await fetchJson(`/lessons/${SESSION_ID}/manifest`);
        renderManifest(payload);
        const session = payload.session || {};
        if (session.state === "ready") {
          const [c, prep, smap, tcalls] = await Promise.all([
            fetchJson(`/lessons/${SESSION_ID}/comments`),
            fetchJson(`/lessons/${SESSION_ID}/score-prep`),
            fetchOptionalJson(`/lessons/${SESSION_ID}/score-map`, {}),
            fetchOptionalJson(`/lessons/${SESSION_ID}/tool-calls`, { tool_calls: [] }),
          ]);
          setScoreMap(smap);
          renderScore(prep);
          renderComments(c);
          renderToolCalls(tcalls);
          stopPolling();
        } else if (session.state === "failed") {
          commentsHost.innerHTML = `<div class="empty" style="color:var(--danger)">Lesson processing failed. Check the home page.</div>`;
          stopPolling();
        } else {
          commentsHost.innerHTML = `<div class="pending"><span class="spinner"></span>${(session.state || "processing").replace(/_/g, " ")}…</div>`;
          schedulePoll();
        }
      } catch (error) {
        commentsHost.innerHTML = `<div class="empty" style="color:var(--danger)">${escapeHtml(error.message)}</div>`;
      }
    }

    function schedulePoll() { stopPolling(); pollHandle = setTimeout(loadAll, 5000); }
    function stopPolling() { if (pollHandle) { clearTimeout(pollHandle); pollHandle = null; } }

    initAuthPill().then(() => {
      video.src = `/lessons/${SESSION_ID}/video${uquery()}`;
      loadAll();
    });
  </script>
</body>
</html>
